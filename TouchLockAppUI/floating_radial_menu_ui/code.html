<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Floating Radial Menu</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen overflow-hidden">
<!-- Header / Navigation Placeholder -->
<header class="flex items-center justify-between p-4 bg-white/10 dark:bg-black/10 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">menu</span>
<h1 class="text-lg font-bold">Floating Hub</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined">notifications</span>
<div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center border border-primary/30">
<span class="material-symbols-outlined text-primary text-sm">person</span>
</div>
</div>
</header>
<!-- Main Content Area (Abstract Background) -->
<main class="relative flex flex-col items-center justify-center h-[calc(100vh-64px)] p-6">
<div class="w-full max-w-md space-y-6">
<div class="p-6 bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800">
<h2 class="text-xl font-bold mb-2">Screen Interaction</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">The floating radial menu is active. Tap the lock icon to toggle accessibility features or lock your screen interaction.</p>
<div class="mt-4 flex gap-2">
<span class="px-3 py-1 bg-primary/10 text-primary text-xs font-semibold rounded-full uppercase tracking-wider">Active</span>
<span class="px-3 py-1 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-xs font-semibold rounded-full uppercase tracking-wider">V1.2.0</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="aspect-square rounded-xl bg-slate-200/50 dark:bg-slate-800/50 flex flex-col items-center justify-center border border-dashed border-slate-300 dark:border-slate-700">
<span class="material-symbols-outlined text-slate-400">add_circle</span>
<span class="text-xs text-slate-400 mt-2">Widget</span>
</div>
<div class="aspect-square rounded-xl bg-slate-200/50 dark:bg-slate-800/50 flex flex-col items-center justify-center border border-dashed border-slate-300 dark:border-slate-700">
<span class="material-symbols-outlined text-slate-400">add_circle</span>
<span class="text-xs text-slate-400 mt-2">Widget</span>
</div>
</div>
</div>
<!-- Radial Menu Overlay Container -->
<div class="absolute inset-0 pointer-events-none flex items-center justify-center">
<!-- The Radial Menu (Visualized as Expanded) -->
<div class="relative w-80 h-80 flex items-center justify-center pointer-events-auto">
<!-- Background Blur/Dim (Subtle Glassmorphism) -->
<div class="absolute inset-0 bg-background-dark/20 dark:bg-black/40 backdrop-blur-sm rounded-full scale-110 opacity-50 blur-xl"></div>
<!-- Menu Item 1: Lock Screen Touch (Top) -->
<button class="absolute -translate-y-24 bg-white dark:bg-slate-800 p-4 rounded-full shadow-lg border border-primary/20 flex flex-col items-center group transition-all hover:scale-110">
<span class="material-symbols-outlined text-primary">touch_app</span>
<span class="absolute -top-8 text-[10px] font-bold text-primary opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">LOCK TOUCH</span>
</button>
<!-- Menu Item 2: Unlock (Right Top) -->
<button class="absolute translate-x-20 -translate-y-12 bg-white dark:bg-slate-800 p-4 rounded-full shadow-lg border border-primary/20 group transition-all hover:scale-110">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300 group-hover:text-primary">lock_open</span>
<span class="absolute -right-12 top-1/2 -translate-y-1/2 text-[10px] font-bold text-primary opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">UNLOCK</span>
</button>
<!-- Menu Item 3: Move Button (Right Bottom) -->
<button class="absolute translate-x-20 translate-y-12 bg-white dark:bg-slate-800 p-4 rounded-full shadow-lg border border-primary/20 group transition-all hover:scale-110">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300 group-hover:text-primary">drag_pan</span>
<span class="absolute -right-12 top-1/2 -translate-y-1/2 text-[10px] font-bold text-primary opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">MOVE</span>
</button>
<!-- Menu Item 4: Pause (Left Bottom) -->
<button class="absolute -translate-x-20 translate-y-12 bg-white dark:bg-slate-800 p-4 rounded-full shadow-lg border border-primary/20 group transition-all hover:scale-110">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300 group-hover:text-primary">pause</span>
<span class="absolute -left-12 top-1/2 -translate-y-1/2 text-[10px] font-bold text-primary opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap text-right">PAUSE</span>
</button>
<!-- Menu Item 5: Settings (Left Top) -->
<button class="absolute -translate-x-20 -translate-y-12 bg-white dark:bg-slate-800 p-4 rounded-full shadow-lg border border-primary/20 group transition-all hover:scale-110">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300 group-hover:text-primary">settings</span>
<span class="absolute -left-16 top-1/2 -translate-y-1/2 text-[10px] font-bold text-primary opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap text-right">SETTINGS</span>
</button>
<!-- Central Main Floating Button -->
<div class="relative group">
<!-- Glow Animation Placeholder (using shadow for static display) -->
<div class="absolute inset-0 bg-primary/40 rounded-full blur-xl animate-pulse"></div>
<button class="relative z-10 w-20 h-20 bg-primary text-white rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(236,91,19,0.4)] border-4 border-white dark:border-slate-900 transition-transform active:scale-95">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1">lock</span>
</button>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Component Integrated -->
<nav class="fixed bottom-0 left-0 right-0 z-50">
<div class="flex gap-2 border-t border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl px-4 pb-4 pt-2">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">home</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">touch_app</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">share</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">settings</span>
</div>
</a>
</div>
</nav>
<!-- Utility Decoration -->
<div class="fixed top-24 left-10 w-32 h-32 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed bottom-24 right-10 w-48 h-48 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
